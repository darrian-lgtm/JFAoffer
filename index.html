<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazz Forum Arts — Artist Offer Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fc;
  --surface: #ffffff;
  --surface-alt: #f1f3f9;
  --border: #e2e6ef;
  --border-light: #eef0f6;
  --text-primary: #0f1729;
  --text-secondary: #5b6478;
  --text-muted: #8b93a7;
  --accent: #3b5cff;
  --accent-light: #eef1ff;
  --accent-hover: #2d4ae0;
  --green: #10b981; --green-bg: #ecfdf5;
  --red: #ef4444; --red-bg: #fef2f2;
  --yellow: #f59e0b; --yellow-bg: #fffbeb;
  --shadow-sm: 0 1px 2px rgba(15,23,41,0.04);
  --shadow-md: 0 4px 12px rgba(15,23,41,0.06);
  --shadow-lg: 0 8px 30px rgba(15,23,41,0.08);
  --radius: 12px; --radius-sm: 8px; --radius-xs: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text-primary);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}

.app{max-width:1280px;margin:0 auto;padding:32px 24px}
.header{display:flex;align-items:center;gap:16px;margin-bottom:32px}
.header-logo{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-logo svg{width:24px;height:24px}
.header-text h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.header-text .subtitle{font-size:13px;color:var(--text-muted);font-weight:400;margin-top:1px}

.grid{display:grid;grid-template-columns:400px 1fr;gap:24px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

.card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-sm);margin-bottom:16px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:16px}

label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;margin-top:14px}
label:first-child{margin-top:0}
input[type="text"],input[type="number"],input[type="time"],select,textarea{width:100%;padding:9px 12px;background:var(--surface-alt);color:var(--text-primary);border:1px solid var(--border);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;border-radius:var(--radius-xs);transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
textarea{resize:vertical;min-height:72px}
input[type="number"]{font-family:'DM Mono',monospace;font-size:14px}
input[type="range"]{-webkit-appearance:none;width:100%;height:6px;background:var(--border);border-radius:3px;border:none;padding:0;margin:8px 0}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 2px 6px rgba(59,92,255,0.3)}
.row{display:flex;gap:10px}.row>div{flex:1}

.check-group{display:flex;gap:8px;margin-top:6px}
.check-item{flex:1;display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface-alt);border:1px solid var(--border);border-radius:var(--radius-xs);cursor:pointer;transition:all .15s}
.check-item:hover{border-color:var(--accent)}
.check-item.active{border-color:var(--accent);background:var(--accent-light)}
.check-item input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.check-item span{font-size:13px;font-weight:600}

.deal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.deal-btn{padding:14px 12px;cursor:pointer;background:var(--surface-alt);color:var(--text-secondary);border:2px solid transparent;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;text-align:left;border-radius:var(--radius-sm);transition:all .15s}
.deal-btn:hover{border-color:var(--border)}
.deal-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.deal-btn .deal-sub{display:block;font-size:11px;font-weight:400;color:var(--text-muted);margin-top:2px}
.deal-btn.active .deal-sub{color:var(--accent);opacity:0.7}

.night-config{display:flex;gap:8px;margin-top:12px}
.night-box{flex:1;background:var(--surface-alt);padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border-light);text-align:center;transition:opacity .2s}
.night-box.off{opacity:0.25;pointer-events:none}
.night-box h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);margin-bottom:8px}
.night-box select{font-size:12px;padding:6px 8px;text-align:center}

.expense-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.expense-row input{flex:1}.expense-row .exp-name{min-width:110px;font-size:13px;font-weight:500;color:var(--text-secondary)}
.expense-add{margin-top:12px;padding:8px 16px;width:100%;background:transparent;color:var(--accent);border:1px dashed var(--accent);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-radius:var(--radius-xs);transition:background .15s}
.expense-add:hover{background:var(--accent-light)}
.expense-remove{background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;padding:0 4px;line-height:1}

.result-block{background:var(--surface-alt);border-radius:var(--radius-sm);padding:16px;margin-top:12px}
.r-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0}
.r-row+.r-row{border-top:1px solid var(--border-light)}
.r-label{font-size:13px;color:var(--text-secondary)}
.r-value{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.r-row.total{padding-top:12px;margin-top:4px;border-top:2px solid var(--accent)!important}
.r-row.total .r-label{font-weight:700;color:var(--text-primary)}
.r-row.total .r-value{font-weight:700;font-size:18px}

.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}
.stat-card{background:var(--surface-alt);border-radius:var(--radius-sm);padding:14px 16px;text-align:center}
.stat-card .stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;line-height:1.2}
.stat-card .stat-lbl{font-size:11px;color:var(--text-muted);font-weight:500;margin-top:4px}

.c-green{color:var(--green)!important}.c-red{color:var(--red)!important}.c-yellow{color:var(--yellow)!important}.c-accent{color:var(--accent)!important}
.bg-green{background:var(--green-bg)!important}.bg-red{background:var(--red-bg)!important}.bg-yellow{background:var(--yellow-bg)!important}

.deal-explain{font-size:13px;color:var(--text-secondary);line-height:1.6;padding:12px 14px;background:var(--accent-light);border-radius:var(--radius-xs);margin-top:12px;border-left:3px solid var(--accent)}
.attendance-display{text-align:center;padding:8px 0}
.attendance-display .big{font-family:'DM Mono',monospace;font-size:32px;font-weight:700;color:var(--accent);line-height:1}
.attendance-display .sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.expense-total{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface-alt);border-radius:var(--radius-xs);margin-top:14px;font-weight:600}
.expense-total .et-val{font-family:'DM Mono',monospace;font-size:16px;color:var(--text-primary)}

.btn-primary{display:block;width:100%;padding:14px 24px;background:var(--accent);color:#fff;border:none;font-family:'Inter',sans-serif;font-weight:700;font-size:14px;cursor:pointer;border-radius:var(--radius-sm);box-shadow:0 2px 8px rgba(59,92,255,0.25);transition:all .15s;margin-top:8px}
.btn-primary:hover{background:var(--accent-hover);box-shadow:0 4px 16px rgba(59,92,255,0.3);transform:translateY(-1px)}
.btn-secondary{display:block;width:100%;padding:14px 24px;background:var(--surface);color:var(--accent);border:2px solid var(--accent);font-family:'Inter',sans-serif;font-weight:700;font-size:14px;cursor:pointer;border-radius:var(--radius-sm);transition:all .15s;margin-top:8px}
.btn-secondary:hover{background:var(--accent-light)}

/* Backline list */
.bl-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.bl-item{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px 10px;background:var(--surface-alt);border-radius:var(--radius-xs);color:var(--text-secondary)}
.bl-item .bl-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* Email modal */
.email-overlay{position:fixed;inset:0;background:rgba(15,23,41,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100}
.email-modal{background:var(--surface);border-radius:var(--radius);padding:32px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.email-modal h2{font-size:18px;font-weight:700;margin-bottom:4px}
.email-modal .em-sub{font-size:13px;color:var(--text-muted);margin-bottom:16px}
.email-modal pre{background:var(--surface-alt);padding:20px;border-radius:var(--radius-sm);font-family:'DM Mono',monospace;font-size:12.5px;line-height:1.7;white-space:pre-wrap;word-wrap:break-word;color:var(--text-primary);border:1px solid var(--border);max-height:50vh;overflow-y:auto}
.email-modal .em-actions{display:flex;gap:8px;margin-top:16px}
.email-modal .em-actions button{flex:1}
.copy-toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 24px;border-radius:var(--radius-sm);font-weight:600;font-size:13px;z-index:200;box-shadow:var(--shadow-lg);animation:fadeInUp .3s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Print offer summary */
.offer-summary{display:none;background:white;color:#1a1a2e;padding:56px;max-width:800px;margin:24px auto;font-family:'Inter',sans-serif}
.offer-summary.visible{display:block}
.offer-summary .os-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #3b5cff;padding-bottom:20px;margin-bottom:28px}
.offer-summary .os-brand{font-size:18px;font-weight:800;letter-spacing:-0.3px;color:#3b5cff}
.offer-summary .os-brand small{display:block;font-size:12px;color:#8b93a7;font-weight:400;letter-spacing:0;margin-top:2px}
.offer-summary .os-date{font-size:12px;color:#8b93a7;text-align:right}
.offer-summary .os-badge{display:inline-block;padding:4px 12px;background:#eef1ff;color:#3b5cff;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.offer-summary h2{font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:24px}
.offer-summary h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#8b93a7;margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid #e2e6ef}
.offer-summary table{width:100%;border-collapse:collapse;font-size:13px}
.offer-summary td{padding:7px 0}
.offer-summary td:last-child{text-align:right;font-weight:600;font-family:'DM Mono',monospace}
.offer-summary .os-total td{border-top:2px solid #3b5cff;font-size:15px;font-weight:700;padding-top:12px}
.offer-summary .os-footer{margin-top:48px;padding-top:16px;border-top:1px solid #e2e6ef;font-size:11px;color:#8b93a7;text-align:center;line-height:1.6}
.offer-summary .os-notes{margin-top:20px;padding:16px;background:#f8f9fc;border-radius:8px;font-size:13px;color:#5b6478;line-height:1.6}
.offer-summary .os-list{margin:0;padding:0 0 0 18px;font-size:13px;line-height:1.8}
.offer-summary .os-list li{color:#5b6478}

@media print{body{background:white}.app{display:none!important}.email-overlay{display:none!important}.offer-summary{display:block!important;box-shadow:none;padding:40px}}

.tip{position:relative;display:inline-flex;align-items:center}
.tip .tip-icon{width:16px;height:16px;line-height:16px;text-align:center;background:var(--border);color:var(--text-muted);font-size:10px;font-weight:700;border-radius:50%;margin-left:4px;cursor:help}
.tip .tip-text{display:none;position:absolute;bottom:26px;left:-80px;width:220px;padding:10px 12px;background:var(--text-primary);color:#fff;font-size:12px;font-weight:400;border-radius:var(--radius-xs);z-index:10;box-shadow:var(--shadow-lg);line-height:1.5}
.tip:hover .tip-text{display:block}

.section-divider{height:1px;background:var(--border-light);margin:4px 0 14px}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.toolbar .tb-current{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary)}
.toolbar .tb-current .tb-name{font-weight:700;color:var(--text-primary);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toolbar .tb-current .tb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tb-btn{padding:8px 16px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-radius:var(--radius-xs);transition:all .15s;white-space:nowrap}
.tb-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.tb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb-btn.primary:hover{background:var(--accent-hover)}

/* Library modal */
.lib-overlay{position:fixed;inset:0;background:rgba(15,23,41,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100}
.lib-modal{background:var(--surface);border-radius:var(--radius);padding:28px;width:90%;max-width:720px;max-height:80vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.lib-modal h2{font-size:18px;font-weight:700;margin-bottom:4px}
.lib-modal .lib-sub{font-size:13px;color:var(--text-muted);margin-bottom:16px}
.lib-list{overflow-y:auto;flex:1;margin:0 -28px;padding:0 28px}
.lib-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface-alt);border:1px solid var(--border-light);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all .15s}
.lib-item:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(59,92,255,0.08)}
.lib-item.active{border-color:var(--accent);background:var(--accent-light)}
.lib-item .li-info{flex:1;min-width:0}
.lib-item .li-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-item .li-meta{font-size:12px;color:var(--text-muted);margin-top:2px}
.lib-item .li-net{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;white-space:nowrap}
.lib-item .li-actions{display:flex;gap:4px}
.lib-item .li-btn{padding:4px 8px;background:transparent;border:1px solid var(--border);border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-muted);font-family:'Inter',sans-serif;transition:all .15s}
.lib-item .li-btn:hover{border-color:var(--accent);color:var(--accent)}
.lib-item .li-btn.danger:hover{border-color:var(--red);color:var(--red)}
.lib-empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="offer-summary" id="offerSummary"></div>
<div id="emailModal"></div>
<div id="toastArea"></div>

<script>
const S = {
  artistName: '', agentName: '', showDate: '',
  dealType: 'vs',
  friday: true, saturday: true, sunday: true,
  friSets: 2, satSets: 2, sunSets: 2,
  seatsPerSet: 90,
  // Set times
  set1Time: '19:00', set2Time: '21:30', set3Time: '23:30', setLength: 70,
  doorsTime: '17:50',
  // Pricing
  ticketPrice: 45, specialEvent: false,
  priceTiers: [
    { name: 'Premium', seats: 30, price: 250 },
    { name: 'Standard', seats: 60, price: 150 },
  ],
  projectedAttendance: 85,
  compTickets: [
    { name: 'Board / Donors', qty: 0 },
    { name: 'Press', qty: 0 },
    { name: 'Artist Guest List', qty: 0 },
  ],
  sponsors: [],  // [{name: '', amount: 0}],
  // Deal params
  guarantee: 2000, artistPct: 70,
  doorPct: 80,
  plusPct: 70, plusGuarantee: 1500,
  // Expenses
  expenses: [
    { name: 'Sound / Tech', amount: 300 },
    { name: 'Hospitality', amount: 150 },
    { name: 'Marketing', amount: 200 },
  ],
  customExpenses: [],
  // Merch
  merchEnabled: true, merchVenuePct: 25,
  merchItems: [
    { name: 'CD', price: 15, qtyPerNight: 8 },
    { name: 'Vinyl', price: 45, qtyPerNight: 3 },
  ],
  // Exclusivity
  exclusivityEnabled: true, exclusivityDays: 60, exclusivityMiles: 15,
  exclusivityExclude: "Dizzy's Club",
  // Hospitality / Backline
  backline: { steinway: true, bass: true, drums: true, sound: true },
  dinner: true, greenRoom: true,
  soundcheck: true, parking: true,
  // Hotel
  hotelProvided: false,
  hotelNights: 2,
  hotelRooms: [
    { type: 'King', costPerNight: 200 },
  ],
  // Driver / Transportation
  driverProvided: false,
  driverType: 'Sedan',
  driverCost: 250,
  driverNotes: '',
  // Notes
  notes: '',
  // Post-Show Actuals
  showActuals: false,
  actualTicketsSold: 0,
  actualTierSales: [],  // [{sold: 0}] per tier, auto-synced
  actualMerchSold: [],  // [{qtySold: 0}] per merch item, auto-synced
};

const $ = id => document.getElementById(id);
const money = n => (n<0?'-':'')+'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const pct = n => n.toFixed(1)+'%';
const fmt12 = t => { if(!t)return''; const [h,m]=t.split(':'); const hr=+h; return `${hr>12?hr-12:hr||12}:${m} ${hr>=12?'PM':'AM'}`; };
const has3Sets = () => S.friSets>=3||S.satSets>=3||S.sunSets>=3;
const maxSets = () => Math.max(S.friSets,S.satSets,S.sunSets);
const setTimesStr = (sep) => { let s=fmt12(S.set1Time)+sep+fmt12(S.set2Time); if(has3Sets()) s+=sep+fmt12(S.set3Time); return s; };

// ── Save / Load System ──
const STORAGE_KEY = 'jfa_offers';
let _currentOfferId = null;
let _lastSavedJSON = '';
let _autoSaveTimer = null;

function getOfferLibrary() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}
function saveOfferLibrary(lib) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(lib));
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function getOfferSnapshot() {
  return JSON.parse(JSON.stringify(S));
}

function loadStateFromSnapshot(snap) {
  // Clear S and load all keys from snapshot
  for (const k of Object.keys(S)) delete S[k];
  Object.assign(S, snap);
}

// Save current offer (create or update)
window.saveOffer = function(forceNew) {
  const lib = getOfferLibrary();
  const c = calc();
  const name = S.artistName || 'Untitled Offer';
  const snap = getOfferSnapshot();
  const meta = {
    name: name,
    date: S.showDate || '',
    dealType: c.dealLabel,
    projectedNet: c.venueNet,
    savedAt: new Date().toISOString(),
  };

  if (_currentOfferId && !forceNew) {
    // Update existing
    const idx = lib.findIndex(o => o.id === _currentOfferId);
    if (idx >= 0) {
      lib[idx] = { ...lib[idx], ...meta, state: snap };
      saveOfferLibrary(lib);
      _lastSavedJSON = JSON.stringify(snap);
      render();
      showToast('Offer saved');
      return;
    }
  }

  // Create new
  const id = generateId();
  lib.unshift({ id, ...meta, createdAt: new Date().toISOString(), state: snap });
  saveOfferLibrary(lib);
  _currentOfferId = id;
  _lastSavedJSON = JSON.stringify(snap);
  render();
  showToast('Offer saved');
};

// Load offer by ID
window.loadOffer = function(id) {
  const lib = getOfferLibrary();
  const offer = lib.find(o => o.id === id);
  if (!offer) { alert('Offer not found.'); return; }
  loadStateFromSnapshot(offer.state);
  _currentOfferId = id;
  _lastSavedJSON = JSON.stringify(offer.state);
  closeLibrary();
  render();
  showToast('Loaded: ' + (S.artistName || 'Untitled'));
};

// Delete offer
window.deleteOffer = function(id, evt) {
  if (evt) evt.stopPropagation();
  if (!confirm('Delete this offer permanently?')) return;
  let lib = getOfferLibrary();
  lib = lib.filter(o => o.id !== id);
  saveOfferLibrary(lib);
  if (_currentOfferId === id) { _currentOfferId = null; _lastSavedJSON = ''; }
  showLibrary(); // refresh the modal
};

// Duplicate offer
window.duplicateOffer = function(id, evt) {
  if (evt) evt.stopPropagation();
  const lib = getOfferLibrary();
  const src = lib.find(o => o.id === id);
  if (!src) return;
  const newId = generateId();
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = newId;
  copy.name = (copy.name || 'Untitled') + ' (copy)';
  copy.createdAt = new Date().toISOString();
  copy.savedAt = new Date().toISOString();
  if (copy.state) copy.state.artistName = copy.name;
  lib.unshift(copy);
  saveOfferLibrary(lib);
  showLibrary(); // refresh
  showToast('Offer duplicated');
};

function calc() {
  const nights = [];
  if (S.friday) nights.push({day:'Friday',abbr:'Fri',sets:S.friSets});
  if (S.saturday) nights.push({day:'Saturday',abbr:'Sat',sets:S.satSets});
  if (S.sunday) nights.push({day:'Sunday',abbr:'Sun',sets:S.sunSets});
  const totalSeatings = nights.reduce((s,n)=>s+n.sets,0);
  const totalSeats = totalSeatings * S.seatsPerSet;
  const projectedTickets = Math.round(totalSeats*S.projectedAttendance/100);

  // ── Comp tickets & sponsor revenue ──
  const totalComps = S.compTickets.reduce((s,c)=>s+(+c.qty||0),0);
  const sponsorRevenue = S.sponsors.reduce((s,sp)=>s+(+sp.amount||0),0);
  let grossPotential, projectedGross, price, tierDetails=[], compRevenueLost=0;
  if (S.specialEvent && S.priceTiers.length > 0) {
    const perSetRevenue = S.priceTiers.reduce((s,t)=>s+((+t.seats||0)*(+t.price||0)),0);
    grossPotential = perSetRevenue * totalSeatings;
    const avgPrice = grossPotential / totalSeats;
    compRevenueLost = totalComps * avgPrice;
    projectedGross = Math.round((grossPotential * S.projectedAttendance / 100) - compRevenueLost);
    const tierSeats = S.priceTiers.reduce((s,t)=>s+(+t.seats||0),0);
    price = tierSeats > 0 ? Math.round(grossPotential / totalSeats) : 0;
    tierDetails = S.priceTiers.map(t=>({name:t.name,seats:+t.seats||0,price:+t.price||0,perSet:(+t.seats||0)*(+t.price||0)}));
  } else {
    price = S.ticketPrice;
    grossPotential = totalSeats * price;
    const paidTickets = Math.max(0, projectedTickets - totalComps);
    projectedGross = paidTickets * price;
    compRevenueLost = totalComps * price;
  }
  const baseExpenses = S.expenses.reduce((s,e)=>s+(+e.amount||0),0)+S.customExpenses.reduce((s,e)=>s+(+e.amount||0),0);
  const hotelCost = S.hotelProvided ? S.hotelRooms.reduce((s,r)=>s+((+r.costPerNight||0)*(+S.hotelNights||0)),0) : 0;
  const driverCost = S.driverProvided ? (+S.driverCost||0) : 0;
  const totalExpenses = baseExpenses + hotelCost + driverCost;
  const merchPerNight = S.merchEnabled ? S.merchItems.reduce((s,m)=>s+((+m.price||0)*(+m.qtyPerNight||0)),0) : 0;
  const merchGross = merchPerNight * nights.length;
  const merchVenueRev = merchGross * (S.merchVenuePct/100);
  const merchArtistRev = merchGross - merchVenueRev;
  const merchItemDetails = S.merchItems.map(m=>({name:m.name,price:+m.price||0,qty:+m.qtyPerNight||0,perNight:(+m.price||0)*(+m.qtyPerNight||0)}));
  let artistPay=0,dealLabel='',dealExplain='',dealEmailText='';
  if(S.dealType==='flat'){
    artistPay=+S.guarantee||0; dealLabel='Flat Guarantee';
    dealExplain=`Fixed fee of <strong>${money(artistPay)}</strong> paid regardless of ticket sales.`;
    dealEmailText=`$${artistPay.toLocaleString()} per night`;
  }else if(S.dealType==='vs'){
    const ps=projectedGross*(S.artistPct/100),g=+S.guarantee||0;
    artistPay=Math.max(g,ps); dealLabel='VS Deal';
    const w=ps>g?'percentage wins':'guarantee wins';
    dealExplain=`<strong>${money(g)}</strong> guarantee <em>vs</em> <strong>${S.artistPct}%</strong> of gross (<strong>${money(ps)}</strong>). <strong>${w}</strong>.`;
    dealEmailText=`$${g.toLocaleString()} vs. ${S.artistPct}% of net box office, whichever is greater`;
  }else if(S.dealType==='door'){
    artistPay=projectedGross*(S.doorPct/100); dealLabel='Door Split';
    dealExplain=`No guarantee. Artist receives <strong>${S.doorPct}%</strong> of gross ticket revenue.`;
    dealEmailText=`${S.doorPct}/${100-S.doorPct} split in favor of the artist after expenses`;
  }else if(S.dealType==='plus'){
    const g=+S.plusGuarantee||0,be=g+totalExpenses,ov=Math.max(0,projectedGross-be),bonus=ov*(S.plusPct/100);
    artistPay=g+bonus; dealLabel='Plus Deal';
    dealExplain=`<strong>${money(g)}</strong> guarantee <em>plus</em> <strong>${S.plusPct}%</strong> above breakeven (<strong>${money(be)}</strong>). Bonus: <strong>${money(bonus)}</strong>.`;
    dealEmailText=`$${g.toLocaleString()} guarantee + ${S.plusPct}% of net box office above breakeven`;
  }
  const venueCost=artistPay+totalExpenses;
  const totalVenueRevenue=projectedGross+merchVenueRev+sponsorRevenue;
  const venueNet=totalVenueRevenue-venueCost;
  const breakeven=price>0?Math.ceil(venueCost/price):0;
  const breakevenPct=totalSeats>0?(breakeven/totalSeats*100):0;
  const perTicketCost=projectedTickets>0?venueCost/projectedTickets:0;
  const margin=totalVenueRevenue>0?(venueNet/totalVenueRevenue*100):0;

  // ── Post-Show Actuals ──
  // Sync actuals arrays to match current tiers/merch items
  while(S.actualTierSales.length<S.priceTiers.length) S.actualTierSales.push({sold:0});
  while(S.actualTierSales.length>S.priceTiers.length) S.actualTierSales.pop();
  while(S.actualMerchSold.length<S.merchItems.length) S.actualMerchSold.push({qtySold:0});
  while(S.actualMerchSold.length>S.merchItems.length) S.actualMerchSold.pop();

  let actGross=0, actTickets=0, actArtistPay=0, actMerchGross=0, actMerchVenueRev=0, actMerchArtistRev=0;
  if(S.showActuals){
    if(S.specialEvent && S.priceTiers.length>0){
      actGross = S.actualTierSales.reduce((s,t,i)=>s+((+t.sold||0)*(+S.priceTiers[i].price||0)),0);
      actTickets = S.actualTierSales.reduce((s,t)=>s+(+t.sold||0),0);
    } else {
      actTickets = +S.actualTicketsSold||0;
      actGross = actTickets * price;
    }
    // Recalculate artist pay based on actuals
    if(S.dealType==='flat') actArtistPay=+S.guarantee||0;
    else if(S.dealType==='vs'){ actArtistPay=Math.max(+S.guarantee||0, actGross*(S.artistPct/100)); }
    else if(S.dealType==='door') actArtistPay=actGross*(S.doorPct/100);
    else if(S.dealType==='plus'){
      const g=+S.plusGuarantee||0,be=g+totalExpenses,ov=Math.max(0,actGross-be),bonus=ov*(S.plusPct/100);
      actArtistPay=g+bonus;
    }
    // Actual merch
    actMerchGross = S.actualMerchSold.reduce((s,m,i)=>s+((+m.qtySold||0)*(+S.merchItems[i].price||0)),0);
    actMerchVenueRev = S.merchEnabled ? actMerchGross*(S.merchVenuePct/100) : 0;
    actMerchArtistRev = actMerchGross - actMerchVenueRev;
  }
  const actVenueCost = actArtistPay + totalExpenses;
  const actTotalVenueRevenue = actGross + actMerchVenueRev;
  const actVenueNet = actTotalVenueRevenue - actVenueCost;
  const actMargin = actTotalVenueRevenue>0?(actVenueNet/actTotalVenueRevenue*100):0;
  const actuals = {actGross,actTickets,actArtistPay,actMerchGross,actMerchVenueRev,actMerchArtistRev,actVenueCost,actTotalVenueRevenue,actVenueNet,actMargin};

  return {nights,totalComps,compRevenueLost,sponsorRevenue,price,totalSeats,totalSeatings,projectedTickets,grossPotential,projectedGross,baseExpenses,hotelCost,driverCost,totalExpenses,artistPay,dealLabel,dealExplain,dealEmailText,venueCost,venueNet,breakeven,breakevenPct,perTicketCost,margin,merchPerNight,merchGross,merchVenueRev,merchArtistRev,merchItemDetails,totalVenueRevenue,tierDetails,actuals};
}

// ── Artist History ──
function getArtistHistory(name) {
  if (!name) return [];
  const lib = getOfferLibrary();
  const lowerName = name.toLowerCase();
  return lib.filter(o => {
    const offerName = (o.state && o.state.artistName || o.name || '').toLowerCase();
    return offerName.includes(lowerName) && offerName !== (S.artistName || '').toLowerCase();
  }).map(o => ({
    name: o.name || 'Untitled',
    date: o.date || 'No date',
    dealType: o.dealType || '',
    projectedNet: o.projectedNet || 0,
    state: o.state || {}
  }));
}

// ── Season View Modal ──
function getSeasonStats() {
  const lib = getOfferLibrary();
  if (lib.length === 0) return null;
  
  let totalShows = 0, totalNights = 0, totalTicketRev = 0, totalExpenses = 0;
  let totalArtistPay = 0, totalSponsors = 0, totalNet = 0;
  const items = [];
  
  lib.forEach(o => {
    if (!o.state) return;
    const c = calcFromState(o.state);
    if (!c) return;
    
    totalShows++;
    totalNights += c.nights.length;
    totalTicketRev += c.projectedGross;
    totalExpenses += c.totalExpenses;
    totalArtistPay += c.artistPay;
    totalSponsors += c.sponsorRevenue || 0;
    totalNet += c.venueNet;
    
    const margin = c.totalVenueRevenue > 0 ? (c.venueNet / c.totalVenueRevenue * 100) : 0;
    const avgAtt = c.totalSeats > 0 ? Math.round(c.projectedTickets / c.totalSeats * 100) : 0;
    items.push({
      name: o.name || 'Untitled',
      date: o.date || 'N/A',
      dealType: c.dealLabel || '',
      gross: c.projectedGross,
      expenses: c.totalExpenses,
      net: c.venueNet,
      margin: margin,
      attendance: avgAtt
    });
  });
  
  items.sort((a, b) => new Date(b.date) - new Date(a.date));
  
  const avgAtt = totalNights > 0 ? Math.round(totalTicketRev / (totalShows * Math.max(1, totalNights/totalShows))) : 0;
  const avgMargin = totalTicketRev > 0 ? (totalNet / totalTicketRev * 100) : 0;
  
  return {
    totalShows, totalNights, totalTicketRev, totalExpenses, totalArtistPay,
    totalSponsors, totalNet, avgMargin, items
  };
}

function calcFromState(state) {
  // Temporarily swap state, calc, restore
  const oldS = JSON.parse(JSON.stringify(S));
  for (const k of Object.keys(S)) delete S[k];
  Object.assign(S, state);
  const result = calc();
  for (const k of Object.keys(S)) delete S[k];
  Object.assign(S, oldS);
  return result;
}

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Email Generator ──
window.generateEmail=function(){
  const c=calc();
  const artist=S.artistName||'[Artist Name]';
  const agent=S.agentName||'[Agent Name]';
  const dates=S.showDate||'[Dates]';
  const nightsCount=c.nights.length;
  const setsPerNight=c.nights.length>0?c.nights[0].sets:2;

  const backlineItems=[];
  if(S.backline.steinway) backlineItems.push('Steinway B piano');
  if(S.backline.bass) backlineItems.push('Bass & amp');
  if(S.backline.drums) backlineItems.push('Drum kit (Canopus, 18" kick)');
  if(S.backline.sound) backlineItems.push('Sound system provided');
  if(S.dinner) backlineItems.push('Dinner provided between sets');
  if(S.greenRoom) backlineItems.push('Green room with water, beer, wine');

  const detailItems=[];
  detailItems.push(`Doors: ${fmt12(S.doorsTime)}`);
  if(S.soundcheck) detailItems.push('Soundcheck: coordinated in advance');
  if(S.parking) detailItems.push('Parking available onsite');
  if(S.hotelProvided) {
    const roomDesc = S.hotelRooms.length===1 ? `1 ${S.hotelRooms[0].type} room` : S.hotelRooms.map((r,i)=>`${r.type}`).join(', ')+` (${S.hotelRooms.length} rooms)`;
    detailItems.push(`Hotel: ${roomDesc}, ${S.hotelNights} night${S.hotelNights>1?'s':''}`);
  } else detailItems.push('No hotel provided unless otherwise agreed');
  if(S.driverProvided) detailItems.push(`Transportation: ${S.driverType} service provided${S.driverNotes?' ('+S.driverNotes+')':''}`);

  let email=`Subject: Jazz Forum Arts – ${artist} – ${dates}\n\nHey ${agent},\n\nHope you're doing well.\n\nWe'd love to present ${artist} at Jazz Forum Arts for the following dates:\n\nDates: ${dates}\nSets: ${setsPerNight} x ${S.setLength}-minute sets per night (${setTimesStr(' & ')})\nVenue: Jazz Forum Arts, Tarrytown, NY (${S.seatsPerSet}-seat capacity)\n\n\nCompensation\n\n${c.dealEmailText}\n\n\nTicket Pricing\n\n${S.specialEvent&&S.priceTiers.length>0?S.priceTiers.map(t=>`${t.name||'Tier'}: ${t.seats} seats at $${t.price}`).join('\n'):`$${c.price} per ticket`}\n\n\nHospitality & Backline\n\n${backlineItems.map(b=>'• '+b).join('\n')}\n\n\nMerch\n\n${S.merchEnabled?`We sell artist-provided merch at the box office\n${S.merchVenuePct}% commission to Jazz Forum Arts`:'No merch arrangement'}\n\n\nAdditional Details\n\n${detailItems.map(d=>'• '+d).join('\n')}`;

  if(S.exclusivityEnabled){
    email+=`\n\n\nExclusivity\n\nStandard ${S.exclusivityDays}-day radius clause (${S.exclusivityMiles} miles)${S.exclusivityExclude?`, excluding ${S.exclusivityExclude}`:''}`;
  }

  if(S.notes){
    email+=`\n\n\nAdditional Notes\n\n${S.notes}`;
  }

  email+=`\n\nLet me know if this works for you and we can move forward with a contract.\n\nLooking forward to having you with us.\n\nBest,\nDarrian`;

  $('emailModal').innerHTML=`
    <div class="email-overlay" onclick="if(event.target===this)closeEmail()">
      <div class="email-modal">
        <h2>Email Offer</h2>
        <div class="em-sub">Copy and paste into your email client</div>
        <pre id="emailText">${escH(email)}</pre>
        <div class="em-actions">
          <button class="btn-primary" onclick="copyEmail()">Copy to Clipboard</button>
          <button class="btn-secondary" onclick="closeEmail()">Close</button>
        </div>
      </div>
    </div>`;
};

window.copyEmail=function(){
  const text=$('emailText').innerText;
  navigator.clipboard.writeText(text).then(()=>{
    $('toastArea').innerHTML='<div class="copy-toast">Copied to clipboard!</div>';
    setTimeout(()=>$('toastArea').innerHTML='',2500);
  });
};
window.closeEmail=function(){$('emailModal').innerHTML='';};

// ── Import Functions ──

// CSV parser (handles quoted fields, commas in values)
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  return lines.map(line => {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQ) { if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; } else if (ch === '"') inQ = false; else cur += ch; }
      else { if (ch === '"') inQ = true; else if (ch === ',' || ch === '\t') { cols.push(cur.trim()); cur = ''; } else cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

// Import merch from CSV (matches JFA Merch Settlement Sheet format)
// Expects vertical layout: rows for Item Description, Price, Sales (Units) across columns
// OR horizontal layout: columns for Item, Price, Qty
window.importMerchCSV = function(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) { alert('Could not parse merch data. Please check the format.'); return; }

  // Try to detect JFA vertical format (Item Description in col A, data in cols B+)
  const labels = rows.map(r => (r[0]||'').toLowerCase().trim());
  const descIdx = labels.findIndex(l => l.includes('item description'));
  const typeIdx = labels.findIndex(l => l.includes('merch type'));
  const priceIdx = labels.findIndex(l => l.includes('price'));
  const salesIdx = labels.findIndex(l => l.includes('sales'));

  if (descIdx >= 0 && priceIdx >= 0 && salesIdx >= 0) {
    // JFA vertical format detected
    const descRow = rows[descIdx], priceRow = rows[priceIdx], salesRow = rows[salesIdx];
    const items = [];
    for (let c = 1; c < descRow.length; c++) {
      const name = descRow[c] || (rows[typeIdx] ? rows[typeIdx][c] : '');
      const price = parseFloat((priceRow[c]||'').replace(/[$,]/g,'')) || 0;
      const qty = parseInt(salesRow[c]) || 0;
      if (name || price > 0 || qty > 0) {
        items.push({ name: name || 'Item ' + c, price, sold: qty });
      }
    }
    if (items.length > 0) {
      // Update merch items and actuals
      S.merchItems = items.map(m => ({ name: m.name, price: m.price, qtyPerNight: 0 }));
      S.actualMerchSold = items.map(m => ({ qtySold: m.sold }));
      S.merchEnabled = true;
      render();
      showToast('Imported ' + items.length + ' merch items from settlement sheet');
      return;
    }
  }

  // Try horizontal format: header row with Item/Name, Price, Qty/Sold columns
  const header = rows[0].map(h => h.toLowerCase().trim());
  const nameCol = header.findIndex(h => h.includes('item') || h.includes('name') || h.includes('description'));
  const priceCol = header.findIndex(h => h.includes('price'));
  const qtyCol = header.findIndex(h => h.includes('qty') || h.includes('sold') || h.includes('units') || h.includes('quantity'));

  if (nameCol >= 0 || priceCol >= 0) {
    const items = [];
    for (let r = 1; r < rows.length; r++) {
      const name = nameCol >= 0 ? rows[r][nameCol] || '' : '';
      const price = priceCol >= 0 ? parseFloat((rows[r][priceCol]||'').replace(/[$,]/g,'')) || 0 : 0;
      const qty = qtyCol >= 0 ? parseInt(rows[r][qtyCol]) || 0 : 0;
      if (name || price > 0) items.push({ name, price, sold: qty });
    }
    if (items.length > 0) {
      S.merchItems = items.map(m => ({ name: m.name, price: m.price, qtyPerNight: 0 }));
      S.actualMerchSold = items.map(m => ({ qtySold: m.sold }));
      S.merchEnabled = true;
      render();
      showToast('Imported ' + items.length + ' merch items');
      return;
    }
  }

  alert('Could not detect merch columns. Make sure your CSV has Item Description, Price, and Sales rows or columns.');
};

// Import tickets from CSV (flexible Spectrix/generic format)
window.importTicketCSV = function(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) { alert('Could not parse ticket data.'); return; }

  const header = rows[0].map(h => h.toLowerCase().trim());
  const qtyCol = header.findIndex(h => h.includes('qty') || h.includes('quantity') || h.includes('sold') || h.includes('tickets') || h.includes('count') || h.includes('admissions'));
  const priceCol = header.findIndex(h => h.includes('price') || h.includes('amount') || h.includes('value'));
  const tierCol = header.findIndex(h => h.includes('tier') || h.includes('type') || h.includes('category') || h.includes('ticket type') || h.includes('price band'));
  const totalCol = header.findIndex(h => h.includes('total') || h.includes('revenue') || h.includes('gross'));

  if (qtyCol < 0 && totalCol < 0) {
    // Maybe it's a single summary row or simple format
    // Try to find any number that looks like ticket count
    let totalTickets = 0;
    for (let r = 1; r < rows.length; r++) {
      for (let c = 0; c < rows[r].length; c++) {
        const val = parseInt(rows[r][c]);
        if (val > 0 && val < 10000) { totalTickets += val; break; }
      }
    }
    if (totalTickets > 0) {
      S.actualTicketsSold = totalTickets;
      render();
      showToast('Imported ' + totalTickets + ' tickets');
      return;
    }
    alert('Could not detect ticket columns. Look for columns like Quantity, Tickets, Sold, or Count.');
    return;
  }

  // If we have tiers and special event pricing is on, try to match tiers
  if (tierCol >= 0 && S.specialEvent && S.priceTiers.length > 0) {
    const tierTotals = {};
    for (let r = 1; r < rows.length; r++) {
      const tier = (rows[r][tierCol]||'').trim();
      const qty = qtyCol >= 0 ? parseInt(rows[r][qtyCol]) || 0 : 0;
      if (tier) tierTotals[tier] = (tierTotals[tier]||0) + qty;
    }
    // Try to match CSV tiers to our price tiers by name
    const tierNames = Object.keys(tierTotals);
    let matched = 0;
    S.priceTiers.forEach((pt, i) => {
      const match = tierNames.find(tn => tn.toLowerCase().includes(pt.name.toLowerCase()) || pt.name.toLowerCase().includes(tn.toLowerCase()));
      if (match) { S.actualTierSales[i] = { sold: tierTotals[match] }; matched++; }
    });
    if (matched > 0) {
      render();
      showToast('Imported ticket data for ' + matched + ' tier(s)');
      return;
    }
  }

  // Sum all ticket quantities
  let totalTickets = 0;
  for (let r = 1; r < rows.length; r++) {
    totalTickets += qtyCol >= 0 ? (parseInt(rows[r][qtyCol]) || 0) : 0;
  }
  S.actualTicketsSold = totalTickets;
  // Also fill tier sales if tiered (distribute proportionally by seat allocation)
  if (S.specialEvent && S.priceTiers.length > 0) {
    const totalTierSeats = S.priceTiers.reduce((s,t)=>s+(+t.seats||0),0);
    S.priceTiers.forEach((pt, i) => {
      S.actualTierSales[i] = { sold: totalTierSeats > 0 ? Math.round(totalTickets * (pt.seats / totalTierSeats)) : 0 };
    });
  }
  render();
  showToast('Imported ' + totalTickets + ' tickets');
};

// File reader helper
function readFileAsText(file, callback) {
  const reader = new FileReader();
  reader.onload = e => callback(e.target.result);
  reader.readAsText(file);
}

// Paste modal
window.showPasteModal = function(type) {
  const title = type === 'merch' ? 'Paste Merch Data' : 'Paste Ticket Data';
  const hint = type === 'merch'
    ? 'Paste CSV data from your merch settlement sheet.\nCopy from Numbers/Sheets/Excel and paste here.'
    : 'Paste CSV data from Spectrix or your ticketing system.\nCopy from the export and paste here.';
  $('emailModal').innerHTML = `
    <div class="email-overlay" onclick="if(event.target===this)closePaste()">
      <div class="email-modal">
        <h2>${title}</h2>
        <div class="em-sub">${hint}</div>
        <textarea id="pasteArea" style="width:100%;min-height:200px;font-family:'DM Mono',monospace;font-size:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--surface-alt)" placeholder="Paste data here (CSV or tab-separated)..."></textarea>
        <div class="em-actions">
          <button class="btn-primary" onclick="processPaste('${type}')">Import</button>
          <button class="btn-secondary" onclick="closePaste()">Cancel</button>
        </div>
      </div>
    </div>`;
  setTimeout(() => $('pasteArea').focus(), 100);
};
window.closePaste = function() { $('emailModal').innerHTML = ''; };
window.processPaste = function(type) {
  const text = $('pasteArea').value;
  if (!text.trim()) { alert('No data pasted.'); return; }
  closePaste();
  if (type === 'merch') importMerchCSV(text);
  else importTicketCSV(text);
};

function showToast(msg) {
  $('toastArea').innerHTML = '<div class="copy-toast">' + msg + '</div>';
  setTimeout(() => $('toastArea').innerHTML = '', 3000);
}

render();
</script>
